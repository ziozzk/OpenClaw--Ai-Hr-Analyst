## 使用说明

**修改公司信息：**
直接编辑此文件，更新公司相关信息。

**HR Analyst 会自动读取：**
- 公司名称、地址、联系方式
- HR 联系人信息
- 面试安排配置
- 福利信息（用于回答候选人咨询）

**安全提示：**
- 此文件包含公司内部信息，请勿外传
- 手机号等敏感信息建议脱敏存储
