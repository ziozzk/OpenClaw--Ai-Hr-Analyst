## 面试流程

```yaml
招聘流程:
  步骤:
    1: 简历筛选
    2: 初试（HR 面）
    3: 复试（业务面）
    4: 终试（负责人面）
    5: Offer 发放
    6: 入职办理
    
  各环节周期:
    简历筛选：1-2 工作日
    初试安排：3-5 工作日
    复试安排：3-5 工作日
    终试安排：2-3 工作日
    Offer 审批：2-3 工作日
    
  有效期:
    Offer 有效期：5 工作日
    入职最晚：Offer 接受后 4 周
```

